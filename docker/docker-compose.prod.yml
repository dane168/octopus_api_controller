services:
  backend:
    image: ghcr.io/dane168/octopus-controller-backend:latest
    container_name: octopus-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DATABASE_PATH=/data/octopus-controller.db
    env_file:
      - .env
    volumes:
      - /data/octopus:/data
    expose:
      - "8000"
    networks:
      - octopus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/dane168/octopus-controller-frontend:latest
    container_name: octopus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - octopus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  octopus-network:
    driver: bridge
